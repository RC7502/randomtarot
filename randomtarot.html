
<div id="tarot-widget" style="max-width: 420px; margin: 0 auto; text-align: center;">
    <label for="tarot-sign" style="display:none; margin-bottom:8px; font-weight:600;">
        Choose your sign
    </label>

    <select id="tarot-sign" style="width:100%; display:none; max-width:280px; padding:10px; font-size:16px; margin-bottom:16px;">
        <option value="" selected disabled>Choose your sign</option>
        <option value="aries">Aries</option>
        <option value="taurus">Taurus</option>
        <option value="gemini">Gemini</option>
        <option value="cancer">Cancer</option>
        <option value="leo">Leo</option>
        <option value="virgo">Virgo</option>
        <option value="libra">Libra</option>
        <option value="scorpio">Scorpio</option>
        <option value="sagittarius">Sagittarius</option>
        <option value="capricorn">Capricorn</option>
        <option value="aquarius">Aquarius</option>
        <option value="pisces">Pisces</option>
    </select>

    <div style="display:flex; justify-content:center;">
        <img id="tarot-card-image"
             src=""
             alt="Tarot card"
             style="max-width:100%; width:320px; height:auto; display:block; transition:transform 0.2s ease;" />
    </div>

    <div id="tarot-card-label" style="margin-top:12px; font-size:18px; font-weight:600;"></div>
</div>
